<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!--Permite caracteres especiais-->
    <meta charset="UTF-8">
    <!--Ajusta a página para celulares-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog do Felipe</title>
    <style>
        header{
            background-color: #183C63;
            color: white;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
            box-sizing: border-box;
            /* Espaçamento interno vertical e horizontal */
            padding: 10px 20px;
        }

        main{
            background-color: #183C63;
            color: white;
            text-align: left;
            max-width: 2000px;
            margin: 20px auto 0;
            padding: 10px 20px;
            box-sizing: border-box;
        }
    </style>
</head>

<body>
    <header>
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre programação</p>
    </header>
    <main>
        <h2>Meu Primeiro Post</h2>
        <p>Bem-vindo ao meu novo blog!</p>
        <p>Prof. Felipe Teston</p>
    </main>
</body>
</html>
