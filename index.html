<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!--Permite caracteres especiais-->
    <meta charset="UTF-8">
    <!--Ajusta a página para celulares-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog do Felipe</title>
    <style>
        header{
            background-color: #183C63;
            color: white;
            text-align: center;
            max-width: 800px; 
            /* espaço externo cima direita baixo esquerda */
            margin: 20px auto 20px;
            box-sizing: border-box;
            /* Espaçamento interno vertical e horizontal */
            padding: 10px 20px;
            /* Estilo da borda - espessura, tipo e cor */
            border: 10px ridge rgba(254, 254, 254,0.6);
        }

        main{
            background-color: #183C63;
            color: white;
            text-align: left;
            max-width: 800px;
            width: 80%;
            margin: 20px auto 0;
            padding: 10px 20px;
            box-sizing: border-box;
        }
        .arte-emoji{
            text-align: center; 
        }
        .arte-emoji img{
            width: 50px;
        }
        .projeto-P5 iframe{
            width: 500px;
            height: 350px;
            border: none
        }
        .titulo-sistema-solar{
            text-align: center;
        }
    </style>
</head>

<body>
    <header>
        <h1>Meu blog tech</h1>
        <p>Vou compartilhar conhecimentos sobre programação</p>
    </header>

    <section class="arte-emoji">
        <img src="imagem/emoji.png" alt="Emoji sorrindo">
    </section>

    <main>
        <h2 class="titulo-sistema-solar">Meu Sistema Solar</h2>
        <section class="projeto-P5">
            <iframe src="https://editor.p5js.org/felipe.teston/full/MEKTKIVZZ"></iframe>
        </section>
        <p>Prof. Felipe Teston</p>
    </main> 
</body>
</html>
